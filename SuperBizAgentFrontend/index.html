<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀系统智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #007AFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .new-chat-btn:hover {
            background: #0056b3;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .welcome-greeting {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-greeting h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }

        .welcome-greeting p {
            color: #666;
            font-size: 14px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #007AFF;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #34C759;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            background: #fff;
            border: 1px solid #e0e0e0;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user .message-content {
            background: #007AFF;
            color: #fff;
            border: none;
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: #fff;
            position: sticky;
            bottom: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            max-height: 120px;
            outline: none;
        }

        .message-input:focus {
            border-color: #007AFF;
        }

        .send-btn {
            padding: 12px 24px;
            background: #007AFF;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .send-btn:hover {
            background: #0056b3;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #007AFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">新建对话</button>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-greeting" id="welcomeGreeting" style="display: block;">
                    <h2>👋 欢迎使用秒杀系统智能助手</h2>
                    <p>我是您的专属助手，可以帮您查询商品、订单和处理数据分析</p>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea
                        class="message-input"
                        id="messageInput"
                        placeholder="输入你的问题..."
                        rows="1"
                        maxlength="1000"
                    ></textarea>
                    <button class="send-btn" id="sendBtn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessionId = generateSessionId();
        let currentChatHistory = [];

        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const welcomeGreeting = document.getElementById('welcomeGreeting');

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        sendBtn.addEventListener('click', sendMessage);

        newChatBtn.addEventListener('click', function() {
            sessionId = generateSessionId();
            currentChatHistory = [];
            const messages = chatMessages.querySelectorAll('.message');
            messages.forEach(msg => msg.remove());
            welcomeGreeting.style.display = 'block';
        });

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            welcomeGreeting.style.display = 'none';

            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';

            currentChatHistory.push({ role: 'user', content: message });

            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>';

            const loadingMsg = addMessage('思考中...', 'assistant');

            fetch('http://localhost:6872/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: sessionId,
                    question: message
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('请求失败');
                return response.json();
            })
            .then(data => {
                chatMessages.removeChild(loadingMsg);
                const answer = data.data?.answer || data.answer || '抱歉，我没有收到有效的响应';
                addMessage(answer, 'assistant');
                currentChatHistory.push({ role: 'assistant', content: answer });
            })
            .catch(error => {
                chatMessages.removeChild(loadingMsg);
                addMessage('错误: ' + error.message, 'assistant');
            })
            .finally(() => {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            });
        }

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = type === 'user' ? '我' : 'AI';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);

            chatMessages.scrollTop = chatMessages.scrollHeight;

            return messageDiv;
        }
    </script>
</body>
</html>
